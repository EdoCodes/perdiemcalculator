# Sync official GSA CONUS per diem rates into Supabase.
# No local .env required — add secrets in GitHub (see below).
#
# Required repository secrets:
#   GSA_API_KEY
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
#
# Run manually: Actions → Sync GSA rates → Run workflow

name: Sync GSA rates

on:
  workflow_dispatch:
  schedule:
    # Weekly Monday 06:00 UTC (after GSA may publish updates)
    - cron: "0 6 * * 1"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm

      - run: npm ci

      - name: Sync GSA CONUS rates to Supabase
        env:
          GSA_API_KEY: ${{ secrets.GSA_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run sync:gsa
