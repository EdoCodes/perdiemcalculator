[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22.12.0"
  # Canonical URLs + sitemap (override in Netlify UI if you use a custom domain).
  PUBLIC_SITE_URL = "https://perdiemproject.netlify.app"
  # Also set in Netlify UI (required for the calculator):
  # PUBLIC_SUPABASE_URL, PUBLIC_SUPABASE_ANON_KEY

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
