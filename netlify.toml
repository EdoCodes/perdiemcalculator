[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Astro 6 requires Node >= 22.12.0
  NODE_VERSION = "22.12.0"
  # IMPORTANT: Also set in Netlify UI (Site configuration → Environment variables):
  # PUBLIC_SUPABASE_URL, PUBLIC_SUPABASE_ANON_KEY, PUBLIC_SITE_URL
  # Astro bakes PUBLIC_* into the client at build time — trigger a new deploy after adding them.
